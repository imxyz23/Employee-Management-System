<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Employee Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body class="bg-light">

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

<div class="container">

<a class="navbar-brand fw-bold" href="/dashboard">

<i class="fa-solid fa-building"></i>

Employee Management System

</a>

<button class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#navbarNav">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/dashboard">
<i class="fa-solid fa-house"></i> Dashboard
</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="/employees">
<i class="fa-solid fa-users"></i> Employees
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/attendance">
<i class="fa-solid fa-calendar-check"></i> Attendance
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/leave">
<i class="fa-solid fa-plane-departure"></i> Leave
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/payroll">
<i class="fa-solid fa-money-bill-wave"></i> Payroll
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/performance">
<i class="fa-solid fa-chart-line"></i> Performance
</a>
</li>

<li class="nav-item ms-2">
<a class="btn btn-danger btn-sm" href="/logout">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</a>
</li>

</ul>

</div>

</div>

</nav>

<div class="container mt-5">

<h1 class="text-center fw-bold mb-4">

<i class="fa-solid fa-users"></i>

Employee Management

</h1>

<!-- Search -->

<form action="/employees" method="GET" class="mb-4">

<div class="row g-2">

<div class="col-md-10">

<input
type="text"
name="search"
class="form-control"
placeholder="Search Employee..."
value="{{ search }}">

</div>

<div class="col-md-2">

<button class="btn btn-primary w-100">

<i class="fa-solid fa-magnifying-glass"></i>

Search

</button>

</div>

</div>

</form>

<!-- Add Employee -->

<div class="card shadow border-0 rounded-4 mb-4">

<div class="card-body">

<h4 class="mb-3">

<i class="fa-solid fa-user-plus"></i>

Add New Employee

</h4>

<form action="/add_employee" method="POST">

<div class="row g-3">

<div class="col-md-4">

<input
type="text"
name="name"
class="form-control"
placeholder="Employee Name"
required>

</div>

<div class="col-md-4">

<input
type="text"
name="department"
class="form-control"
placeholder="Department"
required>

</div>

<div class="col-md-2">

<input
type="number"
name="salary"
class="form-control"
placeholder="Salary"
required>

</div>

<div class="col-md-2">

<button
class="btn btn-success w-100">

<i class="fa-solid fa-plus"></i>

Add

</button>

</div>

</div>

</form>

</div>

</div>

<!-- Employee Table -->

<div class="card shadow border-0 rounded-4">

<div class="card-body">

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Name</th>

<th>Department</th>

<th>Salary</th>

<th width="200">

Action

</th>

</tr>

</thead>

<tbody>

{% for emp in employees %}

<tr>

<td>{{ emp[0] }}</td>

<td>{{ emp[1] }}</td>

<td>{{ emp[2] }}</td>

<td>₹{{ emp[3] }}</td>

<td>

<a
href="/edit/{{ emp[0] }}"
class="btn btn-warning btn-sm">

<i class="fa-solid fa-pen"></i>

Edit

</a>

<a
href="/delete/{{ emp[0] }}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this employee?')">

<i class="fa-solid fa-trash"></i>

Delete

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
